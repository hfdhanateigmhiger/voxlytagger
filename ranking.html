<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rankings · Vanilla PvP</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="ranking.css">
</head>
<body>

  <!-- NAV -->
  <nav>
    <a class="logo" href="#"><span>VOXLY</span>TIERS</a>
    <ul class="nav-links">
      <li><a href="https://discord.gg/QUtHhRdDbY" target="_blank" rel="noopener noreferrer">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        Discord
      </a></li>
      <li><a href="#" class="active">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Rankings
      </a></li>
      <li><a href="#">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        API Docs
      </a></li>
    </ul>
    <div class="search-box">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="Search player…" id="search-input">
    </div>
  </nav>

  <!-- CATEGORY TABS -->
  <div class="tabs-wrap">
    <div class="tabs">
      <div class="tab active">
      <div class="tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M8 12h8M12 8v8"/></svg>
        Vanilla
      </div>
      
    </div>
  </div>

  <!-- BOARD -->
  <main class="board">
    <div class="tier-col" id="tier1">
      <div class="tier-header"><span class="trophy">🏆</span> Tier 1</div>
      <div class="tier-header-divider"></div>
      <ul class="player-list" id="tier1-list"></ul>
    </div>
    <div class="tier-col" id="tier2">
      <div class="tier-header"><span class="trophy">🥈</span> Tier 2</div>
      <div class="tier-header-divider"></div>
      <ul class="player-list" id="tier2-list"></ul>
    </div>
    <div class="tier-col" id="tier3">
      <div class="tier-header"><span class="trophy">🥉</span> Tier 3</div>
      <div class="tier-header-divider"></div>
      <ul class="player-list" id="tier3-list"></ul>
    </div>
    <div class="tier-col" id="tier4">
      <div class="tier-header">Tier 4</div>
      <div class="tier-header-divider"></div>
      <ul class="player-list" id="tier4-list"></ul>
    </div>
    <div class="tier-col" id="tier5">
      <div class="tier-header">Tier 5</div>
      <div class="tier-header-divider"></div>
      <ul class="player-list" id="tier5-list"></ul>
    </div>
  </main>

<script src="main.js"></script>
</body>
</html>
